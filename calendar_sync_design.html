<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#f9f9f9",
              "on-surface": "#1a1c1c",
              "surface-container-highest": "#e2e2e2",
              "tertiary-fixed-dim": "#ffb691",
              "surface-container-low": "#f3f3f4",
              "outline": "#727785",
              "primary-container": "#1a73e8",
              "on-primary-fixed": "#001a41",
              "surface-variant": "#e2e2e2",
              "secondary-fixed-dim": "#afc7fb",
              "tertiary-container": "#c55500",
              "on-error-container": "#93000a",
              "surface-dim": "#dadada",
              "error-container": "#ffdad6",
              "secondary": "#475e8c",
              "on-surface-variant": "#414754",
              "tertiary": "#9e4300",
              "on-tertiary-fixed": "#341100",
              "primary-fixed": "#d8e2ff",
              "on-primary-container": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "on-background": "#1a1c1c",
              "inverse-primary": "#adc7ff",
              "on-secondary-container": "#3d5481",
              "on-secondary-fixed": "#001a41",
              "surface-container-high": "#e8e8e8",
              "secondary-fixed": "#d8e2ff",
              "background": "#f9f9f9",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#004493",
              "primary": "#005bbf",
              "surface-container": "#eeeeee",
              "on-secondary-fixed-variant": "#2e4673",
              "tertiary-fixed": "#ffdbcb",
              "surface-tint": "#005bc0",
              "primary-fixed-dim": "#adc7ff",
              "outline-variant": "#c1c6d6",
              "on-tertiary-fixed-variant": "#783100",
              "on-tertiary-container": "#0e0200",
              "inverse-surface": "#2f3131",
              "on-error": "#ffffff",
              "on-tertiary": "#ffffff",
              "surface": "#f9f9f9",
              "secondary-container": "#b2c9fe",
              "inverse-on-surface": "#f0f1f1",
              "error": "#ba1a1a",
              "on-primary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #f9f9f9;
            color: #1a1c1c;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-[#f9f9f9] dark:bg-slate-950 flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-[#eeeeee] dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<h1 class="font-['Manrope'] font-bold tracking-tight text-[#1a1c1c] dark:text-slate-100 text-lg absolute left-1/2 -translate-x-1/2">Đồng bộ lịch</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="max-w-md mx-auto px-6 pt-8 pb-32">
<!-- Content Sections -->
<section class="space-y-4">
<!-- List Container: Using Tonal Layering Instead of Borders -->
<div class="bg-surface-container-low rounded-3xl p-2 space-y-1">
<!-- Row 1: Google Calendar -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl transition-all duration-200 hover:bg-surface-bright">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container rounded-xl">
<span class="material-symbols-outlined text-primary" data-icon="calendar_month">calendar_month</span>
</div>
<span class="font-headline font-semibold text-on-surface">Google Calendar</span>
</div>
<!-- Toggle ON -->
<div class="w-12 h-6 bg-primary rounded-full relative transition-colors cursor-pointer">
<div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div>
</div>
</div>
<!-- Row 2: iCloud Calendar -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl transition-all duration-200 hover:bg-surface-bright">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container rounded-xl">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="cloud">cloud</span>
</div>
<span class="font-headline font-semibold text-on-surface">iCloud Calendar</span>
</div>
<!-- Toggle OFF -->
<div class="w-12 h-6 bg-surface-container-highest rounded-full relative transition-colors cursor-pointer">
<div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow-sm"></div>
</div>
</div>
<!-- Row 3: Outlook Calendar -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl transition-all duration-200 hover:bg-surface-bright">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container rounded-xl">
<span class="material-symbols-outlined text-secondary" data-icon="mail">mail</span>
</div>
<span class="font-headline font-semibold text-on-surface">Outlook Calendar</span>
</div>
<!-- Toggle OFF -->
<div class="w-12 h-6 bg-surface-container-highest rounded-full relative transition-colors cursor-pointer">
<div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow-sm"></div>
</div>
</div>
<!-- Row 4: Lịch hệ thống -->
<div class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl transition-all duration-200 hover:bg-surface-bright">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center bg-surface-container rounded-xl">
<span class="material-symbols-outlined text-primary" data-icon="calendar_today">calendar_today</span>
</div>
<span class="font-headline font-semibold text-on-surface">Lịch hệ thống</span>
</div>
<!-- Toggle ON -->
<div class="w-12 h-6 bg-primary rounded-full relative transition-colors cursor-pointer">
<div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div>
</div>
</div>
</div>
<!-- Descriptive Text -->
<p class="px-4 pt-4 text-on-surface-variant text-sm leading-relaxed opacity-80 font-body">
                Đồng bộ hóa lịch của bạn để Remind Me có thể giúp bạn sắp xếp thời gian rảnh và tránh trùng lặp công việc.
            </p>
</section>
</main>
</body></html>
